<!DOCTYPE html>
<html>
<head>
    <title>Payslip Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script>
    if(!localStorage.getItem("auth")){
        window.location.href="login.html";
    }
</script>

<body class="bg-light">

<div class="container mt-4">

    <h2>Payslip Management 💰</h2>

    <!-- GENERATE PAYSLIP -->
    <div class="card p-3 mt-3">

        <h5>Generate Payslip</h5>

        <div class="row">

            <div class="col-md-2">
                <input id="employeeId" class="form-control" placeholder="Emp ID">
            </div>

            <div class="col-md-2">
                <input id="month" class="form-control" placeholder="Month">
            </div>

            <div class="col-md-2">
                <input id="year" class="form-control" placeholder="Year">
            </div>

            <div class="col-md-2">
                <input id="basic" class="form-control" placeholder="Basic">
            </div>

            <div class="col-md-2">
                <input id="allowances" class="form-control" placeholder="Allowances">
            </div>

            <div class="col-md-2">
                <input id="deductions" class="form-control" placeholder="Deductions">
            </div>

        </div>

        <button class="btn btn-success mt-3" onclick="generatePayslip()">
            Generate Payslip
        </button>

    </div>

    <!-- PAYSLIP LIST -->
    <div class="card p-3 mt-4">

        <h5>Employee Payslips</h5>

        <div class="row mb-2">

            <div class="col-md-3">
                <input id="searchEmpId" class="form-control" placeholder="Employee ID">
            </div>

            <div class="col-md-2">
                <button class="btn btn-primary" onclick="loadPayslips()">
                    Load
                </button>
            </div>

        </div>

        <table class="table table-bordered">

            <thead>
            <tr>
                <th>ID</th>
                <th>Month</th>
                <th>Year</th>
                <th>Net Salary</th>
                <th>PDF</th>
            </tr>
            </thead>

            <tbody id="payslipTable"></tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/payslip.js"></script>

</body>
</html>
