<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2>HR Dashboard</h2>

    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Total Employees</h5>
                <h3 id="totalEmployees">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Pending Leaves</h5>
                <h3 id="pendingLeaves">0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Pending Certifications</h5>
                <h3 id="pendingCerts">0</h3>
            </div>
        </div>

    </div>
</div>

<script src="js/api.js"></script>

<script>
    loadDashboard();
</script>

</body>
</html>
