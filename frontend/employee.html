<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<script>
    if(!localStorage.getItem("auth")){
        window.location.href="login.html";
    }
</script>

<body class="bg-light">

<div class="container mt-4">

    <h2>Employee Management 👨‍💼</h2>

    <!-- ADD EMPLOYEE FORM -->
    <div class="card p-4 mt-3 shadow-sm">

        <h5 class="mb-3">Add Employee</h5>

        <div class="row g-3">

            <!-- First Name -->
            <div class="col-md-3">
                <label class="form-label">First Name</label>
                <input id="firstName" class="form-control">
            </div>

            <!-- Last Name -->
            <div class="col-md-3">
                <label class="form-label">Last Name</label>
                <input id="lastName" class="form-control">
            </div>

            <!-- Gender -->
            <div class="col-md-3">
                <label class="form-label">Gender</label>
                <select id="gender" class="form-select">
                    <option value="">Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- DOB -->
            <div class="col-md-3">
                <label class="form-label">Date of Birth</label>
                <input id="dob" type="date" class="form-control">
            </div>

            <!-- Mobile -->
            <div class="col-md-3">
                <label class="form-label">Mobile Number</label>

                <div class="input-group">

                    <select id="countryCode" class="form-select" style="max-width:120px">
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+61">🇦🇺 +61</option>
                        <option value="+65">🇸🇬 +65</option>
                    </select>

                    <input
                            id="mobile"
                            type="text"
                            class="form-control"
                            placeholder="Mobile Number">
                </div>

            </div>

            <!-- Joining Date -->
            <div class="col-md-3">
                <label class="form-label">Joining Date</label>
                <input id="joiningDate" type="date" class="form-control">
            </div>

            <!-- Department -->
            <div class="col-md-3">
                <label class="form-label">Department</label>

                <select id="department" class="form-select">
                    <option value="">Select Department</option>

                    <option>Software Development</option>
                    <option>Quality Assurance (QA)</option>
                    <option>DevOps</option>
                    <option>Cloud Engineering</option>
                    <option>Data Science</option>
                    <option>Cyber Security</option>
                    <option>UI/UX Design</option>
                    <option>Product Management</option>
                    <option>Business Analysis</option>
                    <option>Human Resources (HR)</option>
                    <option>Finance</option>
                    <option>IT Support</option>

                </select>

            </div>

            <!-- Designation -->
            <div class="col-md-3">
                <label class="form-label">Designation</label>

                <select id="designation" class="form-select">

                    <option value="">Select Designation</option>

                    <option>Intern</option>
                    <option>Trainee</option>
                    <option>Software Engineer</option>
                    <option>Senior Software Engineer</option>
                    <option>Technical Lead</option>
                    <option>Team Lead</option>
                    <option>Project Manager</option>
                    <option>DevOps Engineer</option>
                    <option>QA Engineer</option>
                    <option>Data Analyst</option>
                    <option>Data Scientist</option>
                    <option>UI/UX Designer</option>
                    <option>HR Executive</option>
                    <option>HR Manager</option>

                </select>

            </div>

            <!-- Personal Email -->
            <div class="col-md-3">
                <label class="form-label">Personal Email</label>
                <input id="personalEmail"
                       type="email"
                       class="form-control">
            </div>

            <!-- Company Email -->
            <div class="col-md-3">
                <label class="form-label">Company Email</label>
                <input id="companyEmail"
                       type="email"
                       class="form-control">
            </div>

            <!-- Button -->
            <div class="col-md-3 d-flex align-items-end">
                <button
                        class="btn btn-success w-100"
                        onclick="addEmployee()">
                    Add Employee
                </button>
            </div>

        </div>

    </div>

    <!-- EMPLOYEE LIST -->
    <div class="card p-4 mt-4 shadow-sm">

        <h5>Employee List</h5>

        <table class="table table-bordered table-hover mt-3">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Designation</th>
                <th>Gender</th>
                <th>Email</th>
                <th>Status</th>
            </tr>
            </thead>

            <tbody id="employeeTable"></tbody>

        </table>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/employee.js"></script>

<script>
    loadEmployees();
</script>

</body>
</html>
